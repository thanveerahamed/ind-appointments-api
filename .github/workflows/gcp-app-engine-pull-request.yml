name: Build CI on PR
'on': pull_request
jobs:
  build:
    name: GAE CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install and build
        run: pnpm install --frozen-lockfile && pnpm run gcp-build
